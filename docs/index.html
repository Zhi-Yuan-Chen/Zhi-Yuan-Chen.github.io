<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CzyCoder</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="renderer" content="webkit">
  <meta name="description" content="Description">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link href="https://handsome.xhhdd.cc/fontawesome-free-5.15.4-web/css/fontawesome.css" rel="stylesheet">
    <link href="https://handsome.xhhdd.cc/fontawesome-free-5.15.4-web/css/brands.css" rel="stylesheet">
    <link href="https://handsome.xhhdd.cc/fontawesome-free-5.15.4-web/css/solid.css" rel="stylesheet">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css">
  <!-- 目录跳转 -->
  <link rel="stylesheet" href="https://unpkg.com/docsify-toc@1.0.0/dist/toc.css">
  <!-- <link rel="stylesheet" href="//vox.cab/npm/docsify-sidebar-collapse/dist/sidebar.min.css" /> -->

  <!-- 暗黑模式 -->
  <!-- <link
  rel="stylesheet"
  href="//cdn.jsdelivr.net/npm/docsify-dark-mode@latest/dist/style.min.css"
/> -->
<!-- 侧边栏插件 -->
<!-- <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.css" /> -->
<link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" />
</head>
<body>
  <div id="app">正在疯狂赶到，请稍等</div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true, 
      // disqus: 'shortname',
      search: 'auto', // 默认值
      subMaxLevel: 3 ,
      sidebarDisplayLevel: 1, // set sidebar display level
      loadNavbar: true,
      coverpage: true,
      onlyCover: true,
      toc: {
    scope: '.markdown-section',
    headings: 'h1, h2, h3, h4, h5, h6',
    title: '',
  },
  // darkMode: {
  //   dark: {
  //   background: "#1c2022",
  //   toggleBtnBg: "#34495e",
  //   textColor: "#b4b4b4"
  // },
  // light: {
  //   background: "white",
  //   toggleBtnBg: "var(--theme-color)",
  //   textColor: "var(--theme-color)"
  // }
  // },
      count:{
    countable:true,
    fontsize:'0.9em',
    color:'rgb(90,90,90)',
    language:'chinese'
  },
  search: {
        maxAge: 86400000,//过期时间,单位毫秒,默认一天
        paths: [], // or 'auto'
        placeholder: '请输入搜索关键字',
        noData: '没有搜索到!',
        depth:3
	},
  share: {
            reddit: true,
            linkedin: true,
            facebook: true,
            twitter: true,
            whatsapp: true,
            telegram: true,
        },
        copyCode: {
    buttonText : '复制内容',
    errorText  : '复制失败',
    successText: '如果对你有帮助，转发让更多人看到吧',
  },
  'flexible-alerts': {
      style: 'flat'
    },
    progress: {
        position: "top",
        color: "var(--theme-color,#42b983)",
        height: "3px",
    },
    pagination: {
    previousText: '上一章节',
    nextText: '下一章节',
    crossChapter: true,
    crossChapterText: true,
  },
  plugins: [
        function (hook, vm) {
          // load livere
          hook.beforeEach(function(content) {
              var comment = "<div id='lv-container' data-id='city' data-uid='Mi8xLzM='></div>\n\n----\n"
              return content + comment;
          });

          hook.doneEach(function() {
             (function(d, s) {
                 var j, e = d.getElementsByTagName(s)[0];
                 if (typeof LivereTower === 'function') { return; }
                 j = d.createElement(s);
                 j.src = 'https://cdn-city.livere.com/js/embed.dist.js';
                 j.async = true;
                 e.parentNode.insertBefore(j, e);
             })(document, 'script');
          });
        },
      ],
      }
  </script>
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
  <!-- emoji插件 -->
  <script src="//unpkg.com/docsify/lib/plugins/emoji.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 复制插件 -->
  <script src="https://unpkg.com/docsify-copy-code"></script>
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
  <script src="//unpkg.com/docsify-share/build/index.min.js"></script>
  <script src="https://unpkg.com/docsify-plugin-flexible-alerts"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-progress@latest/dist/progress.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- 目录跳转 -->
  <script src="https://unpkg.com/docsify-toc@1.0.0/dist/toc.js"></script>
<!-- 暗黑模式 -->
  <!-- <script src="//cdn.jsdelivr.net/npm/docsify-dark-mode@latest/dist/index.min.js"></script> -->
  <!-- 分章节按钮 -->
  <script src="//unpkg.com/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- 评论系统 -->

</body>
</html>
