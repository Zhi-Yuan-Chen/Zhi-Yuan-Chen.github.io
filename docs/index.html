<body>
  <div id="app">正在疯狂赶到，请稍等</div>
  <script>
    window.$docsify = {
      name: '',
      repo: '',
      loadSidebar: true, 
      // disqus: 'shortname',
      search: 'auto', // 默认值
      subMaxLevel: 3 ,
      loadNavbar: true,
      coverpage: true,
      onlyCover: true,
      count:{
    countable:true,
    fontsize:'0.9em',
    color:'rgb(90,90,90)',
    language:'chinese'
  },
  search: {
        maxAge: 86400000,//过期时间,单位毫秒,默认一天
        paths: [], // or 'auto'
        placeholder: '请输入搜索关键字',
        noData: '没有搜索到!',
        depth:3
	},
  share: {
            reddit: true,
            linkedin: true,
            facebook: true,
            twitter: true,
            whatsapp: true,
            telegram: true,
        },
        copyCode: {
    buttonText : '复制内容',
    errorText  : '复制失败',
    successText: '如果对你有帮助，转发让更多人看到吧',
  },
  'flexible-alerts': {
      style: 'flat'
    },
    progress: {
        position: "top",
        color: "var(--theme-color,#42b983)",
        height: "3px",
    }
      }
  </script>
  <script src="//unpkg.com/docsify-count/dist/countable.js"></script>
